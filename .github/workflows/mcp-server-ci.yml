name: MCP Server CI

on:
  push:
    branches: ["main"]
    paths:
      - "mcp-server/**"
      - ".github/workflows/mcp-server-ci.yml"
  pull_request:
    paths:
      - "mcp-server/**"
      - ".github/workflows/mcp-server-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
